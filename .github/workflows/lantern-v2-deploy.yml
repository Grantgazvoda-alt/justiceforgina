name: Deploy Operation Lantern Site V2

on:
  push:
    branches: [site-v2]
    paths:
      - '.github/workflows/lantern-v2-deploy.yml'

permissions:
  contents: write

jobs:
  deploy-v2-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Site V2
        uses: actions/checkout@v4

      - name: Install approved Site V2 package
        shell: bash
        run: |
          cat > /tmp/lantern-v2.b64 <<'PAYLOAD'
[... ELLIPSIZATION ...]
PAYLOAD
          base64 -d /tmp/lantern-v2.b64 > /tmp/lantern-v2.tar.gz
          tar -xzf /tmp/lantern-v2.tar.gz -C .
          rm -f .github/workflows/lantern-v2-deploy.yml

      - name: Commit Operation Lantern foundation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build Operation Lantern Site V2 foundation"
          git push origin HEAD:site-v2
