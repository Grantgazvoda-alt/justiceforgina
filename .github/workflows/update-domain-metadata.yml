name: Update domain metadata

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-domain-metadata.yml'

permissions:
  contents: write

jobs:
  update-domain-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace legacy GitHub Pages URL
        run: |
          sed -i 's#https://grantgazvoda-alt.github.io/justiceforgina/#https://justiceforgina.org/#g' index.html

      - name: Commit updated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "Update canonical and social URLs for justiceforgina.org"
            git push
          fi
