name: Install Operation Lantern Site V2 from Main

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/lantern-v2-main-rescue.yml'

permissions:
  contents: write

jobs:
  install-v2:
    runs-on: ubuntu-latest
    steps:
      - name: Check out protected Site V2 branch
        uses: actions/checkout@v4
        with:
          ref: site-v2
          fetch-depth: 0

      - name: Extract staged Site V2 package
        shell: bash
        run: |
          grep '^H4s' .github/workflows/lantern-v2-deploy.yml > /tmp/lantern-v2.b64
          base64 -d /tmp/lantern-v2.b64 > /tmp/lantern-v2.tar.gz
          tar -xzf /tmp/lantern-v2.tar.gz -C .
          rm -f .github/workflows/lantern-v2-deploy.yml
          rm -f .github/workflows/lantern-v2-rescue.yml

      - name: Commit Site V2 foundation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build Operation Lantern Site V2 foundation"
          git push origin HEAD:site-v2
